<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020000">
  <title>Superfan Videos · Relax with Zoe Lane</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="inner-page">

  <nav class="page-nav">
    <a class="nav-brand" href="gallery.html">Relax with Zoe Lane</a>
    <div class="nav-links">
      <a href="gallery.html">Photos</a>
      <a class="active" href="premium.html">Videos</a>
      <a href="account.html">Account</a>
      <a class="logout-link" href="#" onclick="logout(); return false;">Logout</a>
    </div>
  </nav>

  <main class="main">
    <h1 class="section-title">Superfan Videos</h1>
    <p class="section-sub">for superfan subscribers</p>

    <div id="videoContent" style="display:block;">
      <!-- Upgrade banner (shown to non-premium users) -->
      <div class="upgrade-banner" id="upgradeBanner">
        <h2>Unlock Videos</h2>
        <p>Upgrade to Superfan for video access.</p>
        <div class="price">$9.99<span style="font-size:.9rem; color:rgba(255,255,255,.4);">/mo</span></div>
        <p class="price-period">cancel anytime</p>
        <button class="btn btn-accent" onclick="upgradeToSuperfan()">Upgrade to Superfan</button>
      </div>

      <!-- Video grid -->
      <div class="video-grid" id="videoGrid" style="display:none;">
        <!-- Videos rendered by JS -->
      </div>
    </div>
  </main>

  <footer class="site-footer">
    &copy; 2026 Relax with Zoe Lane
  </footer>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/stripe.js"></script>
  <script>
    (async function() {
    const ok = await requireAuth({ minTier: 'fan' });
    if (!ok) return;

    const tier = getUserTier();
    const hasSuperfan = (tier === 'superfan');
    renderVideos(hasSuperfan);

    function renderVideos(hasSuperfan) {
      /* ── Video data — add your videos here ── */
      const videos = [
        { src: null, thumb: null, title: 'Video 1' },
        { src: null, thumb: null, title: 'Video 2' },
        { src: null, thumb: null, title: 'Video 3' },
        { src: null, thumb: null, title: 'Video 4' },
        { src: null, thumb: null, title: 'Video 5' },
        { src: null, thumb: null, title: 'Video 6' },
      ];

      const grid = document.getElementById('videoGrid');
      const banner = document.getElementById('upgradeBanner');

      if (hasSuperfan) {
        banner.style.display = 'none';
        grid.style.display = '';

        videos.forEach((vid, i) => {
          const card = document.createElement('div');
          card.className = 'video-card';

          if (vid.src) {
            card.innerHTML = `<video src="${vid.src}" poster="${vid.thumb || ''}" controls preload="none"></video>`;
          } else {
            card.innerHTML = `
              <div class="placeholder">
                <span class="play-icon">&#9654;</span>
                <span>${vid.title}</span>
              </div>`;
          }

          grid.appendChild(card);
        });
      } else {
        grid.style.display = '';
        videos.forEach((vid) => {
          const card = document.createElement('div');
          card.className = 'video-card';
          card.innerHTML = `
            <div class="placeholder">
              <span class="play-icon">&#9654;</span>
              <span>${vid.title}</span>
            </div>
            <div class="locked-overlay"><span class="lock-icon">&#128274;</span></div>`;
          grid.appendChild(card);
        });
      }
    }
    })();
  </script>

</body>
</html>
