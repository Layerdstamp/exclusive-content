<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020000">
  <title>Account · Relax with Zoe Lane</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="inner-page">

  <nav class="page-nav">
    <a class="nav-brand" href="gallery.html">Relax with Zoe Lane</a>
    <div class="nav-links">
      <a href="gallery.html">Photos</a>
      <a href="premium.html">Videos</a>
      <a class="active" href="account.html">Account</a>
      <a class="logout-link" href="#" onclick="logout(); return false;">Logout</a>
    </div>
  </nav>

  <main class="main">
    <h1 class="section-title">Account</h1>
    <p class="section-sub">manage your subscription</p>

    <div class="account-card">
      <h2>Membership</h2>

      <div class="account-row">
        <span class="account-label">Status</span>
        <span class="account-value" id="statusVal">Active</span>
      </div>

      <div class="account-row">
        <span class="account-label">Tier</span>
        <span id="tierVal"></span>
      </div>

      <div class="account-row">
        <span class="account-label">Access</span>
        <span class="account-value" id="accessVal"></span>
      </div>
    </div>

    <!-- Upgrade CTA for photo-only subs -->
    <div id="upgradeSection" style="text-align:center; margin-top:36px; display:none;">
      <button class="btn btn-accent btn-small" onclick="upgradeToSuperfan()">Upgrade to Superfan</button>
      <p style="margin-top:8px; font-size:.7rem; color:rgba(255,255,255,.2);">Unlock videos with Superfan access.</p>
    </div>

    <!-- Manage subscription -->
    <div style="text-align:center; margin-top:36px;">
      <button class="btn btn-small" onclick="manageSubscription()">Manage Subscription</button>
    </div>

    <!-- Danger zone -->
    <div style="text-align:center; margin-top:48px;">
      <button class="btn btn-small" style="color:rgba(120,25,35,.5); border-color:rgba(120,25,35,.15);" onclick="logout()">Sign Out</button>
    </div>
  </main>

  <footer class="site-footer">
    &copy; 2026 Relax with Zoe Lane
  </footer>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/stripe.js"></script>
  <script>
    (async function() {
    const ok = await requireAuth({ minTier: 'fan' });
    if (!ok) return;

    const tier = getUserTier();
    const tierEl = document.getElementById('tierVal');
    const accessEl = document.getElementById('accessVal');
    const upgradeSection = document.getElementById('upgradeSection');

    if (tier === 'superfan') {
      tierEl.innerHTML = '<span class="tier-badge tier-premium">Superfan</span>';
      accessEl.textContent = 'Photos + Videos';
    } else {
      tierEl.innerHTML = '<span class="tier-badge tier-photos">Fan</span>';
      accessEl.textContent = 'Photos';
      upgradeSection.style.display = '';
    }
    })();
  </script>

</body>
</html>
