<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020000">
  <title>Zoe Lane · Exclusive</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <!-- Slideshow background -->
  <div class="login-bg">
    <img src="assets/images/login/face-1.jpg" class="active" alt="">
    <img src="assets/images/login/face-2.jpg" alt="">
    <img src="assets/images/login/face-3.jpg" alt="">
    <img src="assets/images/login/face-4.jpg" alt="">
    <img src="assets/images/login/face-5.jpg" alt="">
    <img src="assets/images/login/face-6.jpg" alt="">
    <img src="assets/images/login/face-7.jpg" alt="">
  </div>
  <div class="login-overlay"></div>

  <!-- Login card -->
  <div class="login-wrap">
    <div class="login-card">
      <h1>Exclusive</h1>
      <p class="tagline">by Zoe Lane</p>

      <!-- Login form for returning subscribers -->
      <form class="login-form" id="loginForm" autocomplete="off">
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="your@email.com" required>
        </div>
        <div>
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button class="btn" type="submit">Sign In</button>
        <p class="login-error" id="loginError"></p>
      </form>

      <div class="login-divider"><span>new here?</span></div>

      <!-- Subscribe button -->
      <button class="btn btn-accent" id="subscribeBtn">Subscribe</button>
      <p style="margin-top:10px; font-size:.7rem; color:rgba(255,255,255,.2); letter-spacing:.08em;">
        Monthly access to exclusive photos
      </p>

      <!-- Admin backdoor — very subtle -->
      <button class="admin-btn" id="adminBtn">·</button>
    </div>
  </div>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/stripe.js"></script>
  <script>
    /* ── If already authenticated, go straight in ── */
    if (isAuthenticated()) {
      window.location.href = 'gallery.html';
    }

    /* ── Background slideshow ── */
    const slides = document.querySelectorAll('.login-bg img');
    let current = 0;
    setInterval(() => {
      slides[current].classList.remove('active');
      current = (current + 1) % slides.length;
      slides[current].classList.add('active');
    }, 5000);

    /* ── Login form (for subscribers — will integrate with Stripe backend) ── */
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;

      // TODO: In production, verify against your Stripe customer database
      // For now, show a message
      document.getElementById('loginError').textContent =
        'Subscriber login will be active once Stripe is configured.';
    });

    /* ── Subscribe button ── */
    document.getElementById('subscribeBtn').addEventListener('click', () => {
      startCheckout('photos');
    });

    /* ── Admin backdoor ── */
    document.getElementById('adminBtn').addEventListener('click', async () => {
      const pw = prompt('');
      if (pw === null) return;
      const valid = await verifyAdmin(pw);
      if (valid) {
        setAuth('admin');
        window.location.href = 'gallery.html';
      } else {
        showToast('Invalid');
      }
    });
  </script>

</body>
</html>
