<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#020000">
  <title>Zoe Lane · Exclusive</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

  <!-- Fixed background photo -->
  <div class="login-bg">
    <img src="assets/images/login/background.jpg" alt="" fetchpriority="high" decoding="async">
  </div>

  <!-- Centered login card -->
  <div class="login-wrapper">
    <div class="login-card">

      <h1 class="login-title">Exclusive</h1>
      <p class="login-sub">by Zoe Lane</p>

      <!-- Photo strip teaser -->
      <div class="photo-strip">
        <img src="assets/images/login/face-1.jpg" alt="" loading="lazy" decoding="async">
        <img src="assets/images/login/face-3.jpg" alt="" loading="lazy" decoding="async">
        <img src="assets/images/login/face-5.jpg" alt="" loading="lazy" decoding="async">
        <img src="assets/images/login/face-7.jpg" alt="" loading="lazy" decoding="async">
        <img src="assets/images/login/face-2.jpg" alt="" loading="lazy" decoding="async">
        <img src="assets/images/login/face-4.jpg" alt="" loading="lazy" decoding="async">
        <img src="assets/images/login/face-6.jpg" alt="" loading="lazy" decoding="async">
      </div>

      <!-- Login form -->
      <form class="login-form" id="loginForm" autocomplete="off">
        <div class="form-field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="your@email.com" required>
        </div>
        <div class="form-field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button class="btn" type="submit">Sign In</button>
        <p class="login-error" id="loginError"></p>
      </form>

      <div class="login-divider"><span>new here?</span></div>

      <!-- Subscribe button -->
      <button class="btn btn-accent" id="subscribeBtn">Subscribe</button>
      <p style="margin-top:12px; font-size:.65rem; color:rgba(255,255,255,.18); letter-spacing:.1em; font-style:italic;">
        Monthly access to exclusive photos
      </p>

      <!-- Admin backdoor -->
      <button class="admin-btn" id="adminBtn">★</button>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast" id="toast"></div>

  <script src="assets/js/auth.js"></script>
  <script src="assets/js/stripe.js"></script>
  <script>
    if (isAuthenticated()) {
      window.location.href = 'gallery.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('loginError').textContent =
        'Subscriber login will be active once Stripe is configured.';
    });

    document.getElementById('subscribeBtn').addEventListener('click', () => {
      startCheckout('photos');
    });

    document.getElementById('adminBtn').addEventListener('click', async () => {
      const pw = prompt('');
      if (pw === null) return;
      const valid = await verifyAdmin(pw);
      if (valid) {
        setAuth('admin');
        window.location.href = 'gallery.html';
      } else {
        showToast('Invalid');
      }
    });
  </script>

</body>
</html>
