<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020000">
  <title>Welcome · Relax with Zoe Lane</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="inner-page">

  <div class="login-wrap">
    <div class="login-card">
      <h1>You're In</h1>
      <p class="tagline">subscription confirmed</p>
      <p style="font-size:.85rem; color:rgba(255,255,255,.4); margin-bottom:32px; letter-spacing:.06em;">
        Your payment was successful. Welcome to Relax with Zoe Lane.
      </p>
      <a class="btn" href="gallery.html" id="enterBtn">Enter Gallery</a>
    </div>
  </div>

  <script src="assets/js/auth.js"></script>
  <script>
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');
      if (!sessionId || !isAuthenticated()) return;

      try {
        const auth = JSON.parse(localStorage.getItem('zl_auth') || '{}');
        const res = await fetch('/api/checkout-complete', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: 'Bearer ' + auth.token
          },
          body: JSON.stringify({ sessionId })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Unable to confirm subscription');

        localStorage.setItem('zl_auth', JSON.stringify({ token: auth.token, user: data.user }));
      } catch {}
    })();
  </script>

</body>
</html>
