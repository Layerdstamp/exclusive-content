<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#020000">
  <title>Gallery · Relax with Zoe Lane</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="inner-page">

  <nav class="page-nav">
    <a class="nav-brand" href="gallery.html">Relax with Zoe Lane</a>
    <div class="nav-links">
      <a class="active" href="gallery.html">Photos</a>
      <a href="premium.html">Videos</a>
      <a href="account.html">Account</a>
      <a class="logout-link" href="#" onclick="logout(); return false;">Logout</a>
    </div>
  </nav>

  <main class="main">
    <h1 class="section-title">Relax with Zoe Lane Photos</h1>
    <p class="section-sub">new drops posted regularly</p>

    <div class="photo-grid" id="photoGrid">
      <!-- Photos will be rendered by JS -->
    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close">&times;</button>
    <img src="" alt="Full view">
  </div>

  <footer class="site-footer">
    &copy; 2026 Relax with Zoe Lane
  </footer>

  <script src="assets/js/auth.js"></script>
  <script>
    (async function() {
    const ok = await requireAuth({ minTier: 'fan' });
    if (!ok) return;

    const grid = document.getElementById('photoGrid');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = lightbox.querySelector('img');
    let allPhotos = [];
    let lightboxIdx = 0;

    /* Load photo manifest */
    let filenames = [];
    try {
      const resp = await fetch('assets/data/photos.json');
      filenames = await resp.json();
    } catch {}

    if (filenames.length === 0) {
      grid.innerHTML = '<p style="color:rgba(255,255,255,.3);text-align:center;grid-column:1/-1;padding:40px 0;">Photos coming soon.</p>';
      return;
    }

    allPhotos = filenames.map(name => ({
      src: 'assets/images/photos/' + encodeURIComponent(name),
      label: name.replace(/\.[^.]+$/, '')
    }));

    allPhotos.forEach((photo, i) => {
      const card = document.createElement('div');
      card.className = 'photo-card';
      card.innerHTML = `<img src="${photo.src}" alt="Relax with Zoe Lane" loading="lazy" decoding="async">`;
      card.addEventListener('click', () => {
        lightboxIdx = i;
        lightboxImg.src = photo.src;
        lightbox.classList.add('active');
      });
      grid.appendChild(card);
    });

    /* Lightbox nav */
    function lightboxNav(dir) {
      lightboxIdx = (lightboxIdx + dir + allPhotos.length) % allPhotos.length;
      lightboxImg.src = allPhotos[lightboxIdx].src;
    }

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox || e.target.classList.contains('lightbox-close')) {
        lightbox.classList.remove('active');
        lightboxImg.src = '';
      }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') lightbox.classList.remove('active');
      if (lightbox.classList.contains('active')) {
        if (e.key === 'ArrowRight') lightboxNav(1);
        if (e.key === 'ArrowLeft') lightboxNav(-1);
      }
    });
    })();
  </script>

</body>
</html>
